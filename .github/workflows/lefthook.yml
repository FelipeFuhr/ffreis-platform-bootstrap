name: Lefthook

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lefthook:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-lefthook.yml@main
    with:
      working-directory: "."
      go-version-file: "go.mod"
      install-govulncheck: true
      lefthook-bootstrap-command: "make lefthook-bootstrap"
      lefthook-bin: ".bin/lefthook"
      run-pre-push: true
