name: Code Scanning (CodeQL)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    paths:
      - '**'
      - '.github/workflows/**'
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC

permissions:
  actions: read
  contents: read

jobs:
  codeql:
    # GitHub Code Scanning cannot process SARIF uploads from "advanced" CodeQL
    # workflows when repository "default setup" is enabled.
    #
    # Enable this workflow explicitly by setting the repository variable:
    #   CODEQL_ADVANCED_ENABLED=true
    if: vars.CODEQL_ADVANCED_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: CodeQL init
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          languages: go
          source-root: .

      - name: Autobuild
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          category: "/language:go"
          upload: false
