name: Code Scanning (CodeQL)

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@main
    with:
      languages: "go"
      source-root: "."
