name: DevOps / Automation

on:
  schedule:
    - cron: "0 4 * * 0" # Sundays 04:00 UTC
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED != 'false' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED != 'false' && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      only: "both"

  verify-release-please:
    if: vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Release Please credentials
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "::error title=Release Please not configured::Missing RELEASE_PLEASE_TOKEN secret."
            echo "Add in: Settings → Secrets and variables → Actions → New repository secret"
            echo "To skip this job entirely: Settings → Variables → add RELEASE_PLEASE_ENABLED=false"
            exit 1
          fi

  release-please:
    needs: [verify-release-please]
    if: vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
