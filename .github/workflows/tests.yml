name: Unit Tests

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  tests:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      go-version: "1.25.8"
      working-directory: "."
      run-govulncheck: false
