name: Code Security (Go)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  govulncheck:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."
