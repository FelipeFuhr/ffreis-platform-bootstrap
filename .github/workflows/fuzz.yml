name: Fuzzing

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/fuzz.yml'
  push:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/fuzz.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Go Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Fuzz internal/config split trimming
        run: go test ./internal/config -run=^$ -fuzz=FuzzSplitTrimmed -fuzztime=10s -timeout=60s

      - name: Fuzz internal/config account parsing
        run: go test ./internal/config -run=^$ -fuzz=FuzzParseAccounts -fuzztime=10s -timeout=60s

      - name: Fuzz cmd backend rendering
        run: go test ./cmd -run=^$ -fuzz=FuzzRenderBackendHCL -fuzztime=10s -timeout=60s
