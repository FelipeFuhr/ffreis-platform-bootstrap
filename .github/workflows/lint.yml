name: Lint

# Job dependency graph:
#
#   fmt ─┐
#        ├─→ golangci-lint
#   vet ─┘
#
# fmt and vet run in parallel; golangci-lint waits for both.
# Any failure blocks all downstream jobs.

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/lint.yml'
  push:
    branches: [main, master]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format (gofmt)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    name: Lint (vet + golangci-lint)
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."
      golangci-lint-version: "latest"
