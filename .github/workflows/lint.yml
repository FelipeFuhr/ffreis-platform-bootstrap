name: Lint

# Job dependency graph:
#
#   fmt ─┐
#        ├─→ golangci-lint
#   vet ─┘
#
# fmt and vet run in parallel; golangci-lint waits for both.
# Any failure blocks all downstream jobs.

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/lint.yml'
  push:
    branches: [main, master]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format (gofmt)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    name: Lint (vet + golangci-lint)
    needs: [fmt]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "."
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.8"
          cache: true
          cache-dependency-path: "./go.sum"
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --path-prefix=. --timeout=5m
          working-directory: "."
