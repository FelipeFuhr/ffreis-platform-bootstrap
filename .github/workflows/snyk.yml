name: Security Scan (Snyk)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    if: ${{ secrets.SNYK_TOKEN != '' }}
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-snyk.yml@main
    with:
      working-directory: "."
      upload-sarif: true
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
