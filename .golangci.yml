version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - gosec
    - bodyclose
    - noctx
    - godot
    - nolintlint
  settings:
    govet:
      enable:
        - copylocks
    errcheck:
      check-type-assertions: true
      check-blank: false
    godot:
      scope: declarations
      capital: false
  exclusions:
    rules:
      - path: '_test\.go'
        linters: [errcheck, gosec]
      - path: "vendor/"
        linters: [all]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
